services:
  anana-landing:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://anana:anana@db:5432/anana_analytics
      # Uncomment and set to enable external analytics:
      # - NEXT_PUBLIC_GA_ID=G-XXXXXXXXXX
      # - NEXT_PUBLIC_META_PIXEL=XXXXXXXXXX
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: anana
      POSTGRES_PASSWORD: anana
      POSTGRES_DB: anana_analytics
    volumes:
      - analytics_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anana -d anana_analytics"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  analytics_pg:
